{{define "content"}}
<style>
    .cal-cell { aspect-ratio: 1; }
    .cal-bar { position: absolute; bottom: 2px; height: 12px; border-radius: 6px; left: 0; right: 0; }
    .cal-bar-start { right: -2px; border-radius: 6px 0 0 6px; }
    .cal-bar-mid { left: -2px; right: -2px; border-radius: 0; }
    .cal-bar-end { left: -2px; border-radius: 0 6px 6px 0; }
    .cal-bar-single { border-radius: 6px; }
    .popup-overlay { position: fixed; inset: 0; z-index: 40; }
    .day-popup { position: fixed; z-index: 50; width: 320px; max-height: 80vh; overflow-y: auto;
                 box-shadow: 0 10px 40px rgba(0,0,0,0.15); border-radius: 12px; }
</style>

<div x-data="calendar()" x-init="init()" @click.self="closePopup()">
    <!-- Person legend (family mode only) -->
    <div x-show="familyMode" class="mb-6 flex flex-wrap items-center gap-3">
        <span class="text-sm text-gray-600 dark:text-gray-400 font-medium">人员：</span>
        {{range $i, $p := .Persons}}
        <label class="flex items-center gap-1.5 cursor-pointer">
            <input type="checkbox" :checked="personColors[{{$p.ID}}] !== undefined" @change="togglePerson({{$p.ID}})" class="rounded">
            <span class="w-3 h-3 rounded-full" :style="'background-color:' + getColor({{$p.ID}})"></span>
            <span class="text-sm text-gray-700 dark:text-gray-300">{{$p.Name}}</span>
        </label>
        {{end}}
    </div>

    <!-- Calendar -->
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-4">
        <div class="flex items-center justify-between mb-3">
            <button @click="prevMonth()" class="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition">
                <svg class="w-5 h-5 text-gray-600 dark:text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            </button>
            <h2 class="text-lg font-semibold text-gray-800 dark:text-gray-100" x-text="year + '年' + month + '月'"></h2>
            <button @click="nextMonth()" class="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition">
                <svg class="w-5 h-5 text-gray-600 dark:text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
            </button>
        </div>

        <div class="grid grid-cols-7 gap-px bg-gray-200 dark:bg-gray-600">
            <div class="bg-gray-50 dark:bg-gray-750 text-center text-xs font-medium text-gray-500 dark:text-gray-400 py-1.5">日</div>
            <div class="bg-gray-50 dark:bg-gray-750 text-center text-xs font-medium text-gray-500 dark:text-gray-400 py-1.5">一</div>
            <div class="bg-gray-50 dark:bg-gray-750 text-center text-xs font-medium text-gray-500 dark:text-gray-400 py-1.5">二</div>
            <div class="bg-gray-50 dark:bg-gray-750 text-center text-xs font-medium text-gray-500 dark:text-gray-400 py-1.5">三</div>
            <div class="bg-gray-50 dark:bg-gray-750 text-center text-xs font-medium text-gray-500 dark:text-gray-400 py-1.5">四</div>
            <div class="bg-gray-50 dark:bg-gray-750 text-center text-xs font-medium text-gray-500 dark:text-gray-400 py-1.5">五</div>
            <div class="bg-gray-50 dark:bg-gray-750 text-center text-xs font-medium text-gray-500 dark:text-gray-400 py-1.5">六</div>

            <template x-for="day in calendarDays" :key="day.key">
                <div class="relative cal-cell bg-white dark:bg-gray-800 p-1 cursor-pointer overflow-hidden"
                     :class="{'ring-2 ring-pink-500': day.isToday, 'bg-gray-50 dark:bg-gray-750': !day.inMonth}"
                     :data-date="day.fullDate"
                     @click="selectDay(day, $event)">
                    <div class="text-sm font-medium leading-none"
                         :class="{'text-pink-600 dark:text-pink-400 font-bold': day.isToday, 'text-gray-900 dark:text-gray-100': !day.isToday && day.inMonth, 'text-gray-300 dark:text-gray-600': !day.inMonth}"
                         x-text="day.date"></div>
                    <template x-for="bar in day.bars" :key="bar.pid + '-' + bar.kind">
                        <div class="cal-bar" :class="'cal-bar-' + bar.pos"
                             :style="'background-color:' + getColor(bar.pid) + (bar.kind === 'predicted' ? ';opacity:0.4' : '')"></div>
                    </template>
                    <template x-for="pid in day.ovulationPids" :key="'ov-'+pid">
                        <div class="absolute top-1 right-1 w-1.5 h-1.5 rounded-full bg-green-500"></div>
                    </template>
                </div>
            </template>
        </div>

        <!-- Legend -->
        <div class="flex flex-wrap gap-4 mt-3 text-xs text-gray-600 dark:text-gray-400">
            <template x-for="(color, pid) in personColors" :key="pid">
                <div class="flex items-center gap-1">
                    <div class="w-4 h-1.5 rounded-sm" :style="'background-color:' + color"></div>
                    <span x-text="getPersonName(pid)"></span>
                </div>
            </template>
            <div class="flex items-center gap-1"><div class="w-4 h-1.5 rounded-sm bg-gray-400 opacity-40"></div><span>预测</span></div>
            <div class="flex items-center gap-1"><div class="w-1.5 h-1.5 rounded-full bg-green-500"></div><span>排卵日</span></div>
        </div>
    </div>

    <!-- Floating popup -->
    <div x-show="showPopup" x-cloak class="popup-overlay" @click="closePopup()"></div>
    <div x-show="showPopup" x-cloak class="day-popup bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 p-4"
         :style="popupStyle" @click.stop>
        <div class="flex items-center justify-end mb-3">
            <button @click="closePopup()" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>

        <!-- Existing records -->
        <div x-show="dayRecords.length > 0" class="mb-3 space-y-1.5">
            <template x-for="rec in dayRecords" :key="rec.id">
                <div class="flex items-center justify-between p-2 bg-gray-50 dark:bg-gray-700 rounded-lg text-sm">
                    <div class="truncate">
                        <span class="w-2 h-2 rounded-full inline-block mr-1" :style="'background-color:' + getColor(rec.person_id)"></span>
                        <span class="text-gray-800 dark:text-gray-200" x-text="rec.start_date"></span>
                        <span x-show="rec.end_date" class="text-gray-500 dark:text-gray-400"> ~ </span>
                        <span x-show="rec.end_date" class="text-gray-500 dark:text-gray-400" x-text="rec.end_date"></span>
                    </div>
                    <button type="button" @click="deleteRecord(rec.id)" class="text-red-500 hover:text-red-700 text-xs ml-2 shrink-0">删除</button>
                </div>
            </template>
        </div>

        <!-- Mark period start -->
        <div class="border-t border-gray-200 dark:border-gray-600 pt-3 mb-3">
            <div class="flex items-end gap-1.5">
                <div x-show="familyMode">
                    <select x-model="selectedPersonId" class="border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200 rounded-lg px-2 py-1 text-xs">
                        {{range .Persons}}<option value="{{.ID}}">{{.Name}}</option>{{end}}
                    </select>
                </div>
                <input x-show="!familyMode" type="hidden" x-model="selectedPersonId" value="{{(index .Persons 0).ID}}">
                <input type="date" x-model="newEndDate" class="border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200 rounded-lg px-2 py-1 text-xs flex-1" placeholder="结束">
                <input type="text" x-model="newNote" class="border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200 rounded-lg px-2 py-1 text-xs w-16" placeholder="备注">
                <button type="button" @click="createRecord()" class="bg-pink-600 text-white px-2 py-1 rounded-lg text-xs hover:bg-pink-700 shrink-0">开始</button>
            </div>
        </div>

        <!-- Mark period end -->
        <div x-show="openRecords.length > 0" class="border-t border-gray-200 dark:border-gray-600 pt-3 mb-3">
            <template x-for="rec in openRecords" :key="'end-'+rec.id">
                <div class="flex items-center gap-1.5 mb-1.5">
                    <input type="hidden" :value="rec.id">
                    <input type="hidden" :value="rec.start_date">
                    <input type="hidden" :value="rec.person_id">
                    <span class="w-2 h-2 rounded-full shrink-0" :style="'background-color:' + getColor(rec.person_id)"></span>
                    <span class="text-xs text-gray-600 dark:text-gray-400 truncate flex-1" x-text="getPersonName(rec.person_id) + ' ' + rec.start_date"></span>
                    <button type="button" @click="endRecord(rec)" class="bg-purple-600 text-white px-2 py-0.5 rounded text-xs hover:bg-purple-700 shrink-0">结束</button>
                </div>
            </template>
        </div>

        <!-- Daily log -->
        <div class="border-t border-gray-200 dark:border-gray-600 pt-3">
            <div class="mb-2">
                <label class="text-xs text-gray-500 dark:text-gray-400 mr-2">经量</label>
                <div class="inline-flex gap-1.5">
                    <template x-for="(label, level) in flowLevels" :key="level">
                        <button type="button" @click="setFlowLevel(level)"
                            class="px-2 py-0.5 rounded text-xs border transition-all"
                            :class="dailyLog.flow_level == level
                                ? 'border-pink-500 bg-pink-50 dark:bg-pink-900/30 text-pink-700 dark:text-pink-300'
                                : 'border-gray-200 dark:border-gray-600 text-gray-500 dark:text-gray-400 hover:border-gray-300'"
                            x-text="label"></button>
                    </template>
                </div>
            </div>
            <div class="mb-2">
                <label class="text-xs text-gray-500 dark:text-gray-400 block mb-1">症状</label>
                <div class="flex flex-wrap gap-1">
                    <template x-for="s in symptomOptions" :key="s">
                        <button type="button" @click="toggleSymptom(s)"
                            class="px-1.5 py-0.5 rounded-full text-xs border transition-all"
                            :class="dailyLog.symptoms.includes(s)
                                ? 'border-purple-500 bg-purple-50 dark:bg-purple-900/30 text-purple-700 dark:text-purple-300'
                                : 'border-gray-200 dark:border-gray-600 text-gray-500 dark:text-gray-400 hover:border-gray-300'"
                            x-text="s"></button>
                    </template>
                </div>
            </div>
            <div class="flex items-center gap-3 mb-2">
                <div class="flex items-center gap-1">
                    <label class="text-xs text-gray-500 dark:text-gray-400">体重</label>
                    <input type="number" step="0.1" min="0" max="500" x-model.number="dailyLog.weight" @blur="saveDailyLog()"
                        class="w-16 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200 rounded px-1.5 py-0.5 text-xs"
                        placeholder="kg">
                </div>
                <div class="flex items-center gap-1">
                    <label class="text-xs text-gray-500 dark:text-gray-400">体温</label>
                    <input type="number" step="0.1" min="30" max="45" x-model.number="dailyLog.temperature" @blur="saveDailyLog()"
                        class="w-16 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200 rounded px-1.5 py-0.5 text-xs"
                        placeholder="°C">
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button @click="saveDailyLog()" class="bg-pink-600 text-white px-3 py-1 rounded-lg text-xs hover:bg-pink-700 transition"
                    :disabled="dailyLogSaving" x-text="dailyLogSaving ? '...' : '保存'"></button>
                <span x-show="dailyLogSaved" class="text-xs text-green-600 dark:text-green-400">已保存</span>
            </div>
        </div>
    </div>
</div>

<script>
const PERSON_COLORS = ['#ef4444','#3b82f6','#10b981','#f59e0b','#8b5cf6','#ec4899','#14b8a6','#f97316'];

function calendar() {
    return {
        year: {{.Year}},
        month: {{.Month}},
        persons: {{.Persons}},
        familyMode: false,
        personColors: {},
        activePersons: [],
        showOvulation: true,
        periods: [],
        ovulations: [],
        records: [],
        selectedDay: null,
        showPopup: false,
        popupStyle: '',
        calendarDays: [],
        dailyLog: { flow_level: null, symptoms: '', note: '', weight: null, temperature: null },
        dailyLogSaving: false,
        dailyLogSaved: false,
        flowLevels: { 1: '少', 2: '中', 3: '多' },
        symptomOptions: ['痛经', '头痛', '腰酸', '腹胀', '疲劳', '情绪波动', '乳房胀痛', '恶心', '失眠', '食欲变化'],
        selectedPersonId: {{(index .Persons 0).ID}},
        newEndDate: '',
        newNote: '',

        init() {
            const settings = loadSettings();
            this.showOvulation = settings.showOvulation !== false;
            this.familyMode = settings.familyMode === true;
            this.persons.forEach((p, i) => {
                this.personColors[p.id] = (settings.personColors && settings.personColors[p.id]) || PERSON_COLORS[i % PERSON_COLORS.length];
            });
            this.activePersons = this.familyMode ? this.persons.map(p => p.id) : (this.persons.length > 0 ? [this.persons[0].id] : []);
            this.loadData();
        },

        getColor(pid) { return this.personColors[pid] || '#9ca3af'; },
        getPersonName(pid) { const p = this.persons.find(x => x.id === pid); return p ? p.name : ''; },

        togglePerson(pid) {
            const idx = this.activePersons.indexOf(pid);
            if (idx >= 0) this.activePersons.splice(idx, 1);
            else this.activePersons.push(pid);
            this.loadData();
        },

        async loadData() {
            try {
                const resp = await fetch('/api/records?year=' + this.year + '&month=' + this.month);
                const data = await resp.json();
                this.periods = (data.periods || []).filter(p => this.activePersons.includes(p.person_id));
                this.ovulations = (data.ovulations || []).filter(o => this.activePersons.includes(o.person_id));
                this.records = (data.records || []).sort((a, b) => b.start_date.localeCompare(a.start_date));
                this.buildCalendar();
            } catch(e) { console.error(e); }
        },

        buildCalendar() {
            const firstDay = new Date(this.year, this.month - 1, 1);
            const daysInMonth = new Date(this.year, this.month, 0).getDate();
            const startDow = firstDay.getDay();
            const today = new Date();
            const todayStr = fmt(today);
            const days = [];
            const prevLast = new Date(this.year, this.month - 1, 0).getDate();
            for (let i = startDow - 1; i >= 0; i--) {
                const d = prevLast - i;
                const [y, m] = this.month === 1 ? [this.year-1, 12] : [this.year, this.month-1];
                days.push(this.makeDay(d, y+'-'+pad(m)+'-'+pad(d), false, todayStr));
            }
            for (let d = 1; d <= daysInMonth; d++) {
                days.push(this.makeDay(d, this.year+'-'+pad(this.month)+'-'+pad(d), true, todayStr));
            }
            const rem = 42 - days.length;
            for (let d = 1; d <= rem; d++) {
                const [y, m] = this.month === 12 ? [this.year+1, 1] : [this.year, this.month+1];
                days.push(this.makeDay(d, y+'-'+pad(m)+'-'+pad(d), false, todayStr));
            }
            this.calendarDays = days;
        },

        makeDay(date, fullDate, inMonth, todayStr) {
            const bars = [], ovulationPids = [];
            this.periods.forEach(p => {
                if (fullDate >= p.start && fullDate <= p.end) {
                    bars.push({ pid: p.person_id, kind: p.type === 'period' ? 'actual' : 'predicted', pos: barPosition(fullDate, p.start, p.end) });
                }
            });
            if (this.showOvulation) {
                this.ovulations.forEach(o => {
                    if (fullDate === o.start && o.type === 'ovulation_day') ovulationPids.push(o.person_id);
                });
            }
            return { key: fullDate, date, fullDate, inMonth, isToday: fullDate === todayStr, bars, ovulationPids };
        },

        selectDay(day, event) {
            if (!day.inMonth) return;
            this.selectedDay = day;
            this.newEndDate = '';
            this.newNote = '';
            this.loadDailyLog();

            // Position popup near clicked cell
            const rect = event.target.closest('.cal-cell').getBoundingClientRect();
            let top = rect.bottom + 8;
            let left = rect.left;
            // Keep within viewport
            if (left + 320 > window.innerWidth) left = window.innerWidth - 330;
            if (left < 10) left = 10;
            if (top + 400 > window.innerHeight) top = rect.top - 408;
            if (top < 10) top = 10;
            this.popupStyle = 'top:' + top + 'px;left:' + left + 'px';
            this.showPopup = true;
        },

        closePopup() { this.showPopup = false; },

        async loadDailyLog() {
            if (!this.selectedDay || this.persons.length === 0) return;
            try {
                const resp = await fetch('/api/daily/?person_id=' + this.persons[0].id);
                const logs = await resp.json();
                const log = logs.find(l => l.date === this.selectedDay.fullDate);
                this.dailyLog = log ? { flow_level: log.flow_level, symptoms: log.symptoms || '', note: log.note || '', weight: log.weight || null, temperature: log.temperature || null } : { flow_level: null, symptoms: '', note: '', weight: null, temperature: null };
            } catch(e) { this.dailyLog = { flow_level: null, symptoms: '', note: '', weight: null, temperature: null }; }
            this.dailyLogSaved = false;
        },

        setFlowLevel(level) {
            this.dailyLog.flow_level = this.dailyLog.flow_level === level ? null : level;
        },

        toggleSymptom(s) {
            const parts = this.dailyLog.symptoms ? this.dailyLog.symptoms.split(',').filter(x => x) : [];
            const idx = parts.indexOf(s);
            if (idx >= 0) parts.splice(idx, 1); else parts.push(s);
            this.dailyLog.symptoms = parts.join(',');
        },

        async saveDailyLog() {
            if (!this.selectedDay || this.persons.length === 0) return;
            this.dailyLogSaving = true;
            try {
                await fetch('/api/daily/?person_id=' + this.persons[0].id, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ date: this.selectedDay.fullDate, flow_level: this.dailyLog.flow_level, symptoms: this.dailyLog.symptoms, note: this.dailyLog.note, weight: this.dailyLog.weight, temperature: this.dailyLog.temperature })
                });
                this.dailyLogSaved = true;
                setTimeout(() => this.dailyLogSaved = false, 2000);
            } catch(e) {}
            this.dailyLogSaving = false;
        },

        async createRecord() {
            if (!this.selectedDay) return;
            const formData = new URLSearchParams();
            formData.append('start_date', this.selectedDay.fullDate);
            formData.append('person_id', this.selectedPersonId);
            if (this.newEndDate) formData.append('end_date', this.newEndDate);
            if (this.newNote) formData.append('note', this.newNote);
            try {
                await fetch('/record/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData.toString()
                });
                await this.loadData();
                this.newEndDate = '';
                this.newNote = '';
            } catch(e) {}
        },

        async deleteRecord(id) {
            if (!confirm('删除？')) return;
            const formData = new URLSearchParams();
            formData.append('id', id);
            try {
                await fetch('/record/delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData.toString()
                });
                await this.loadData();
            } catch(e) {}
        },

        async endRecord(rec) {
            const formData = new URLSearchParams();
            formData.append('id', rec.id);
            formData.append('start_date', rec.start_date);
            formData.append('person_id', rec.person_id);
            formData.append('end_date', this.selectedDay ? this.selectedDay.fullDate : '');
            try {
                await fetch('/record/edit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData.toString()
                });
                await this.loadData();
            } catch(e) {}
        },

        get dayRecords() {
            if (!this.selectedDay) return [];
            const d = this.selectedDay.fullDate;
            return this.records.filter(r => {
                const start = r.start_date;
                const end = r.effective_end_date || r.end_date || r.start_date;
                return start <= d && end >= d;
            });
        },

        get openRecords() {
            if (!this.selectedDay) return [];
            return this.records.filter(r => !r.end_date && r.start_date < this.selectedDay.fullDate);
        },

        prevMonth() { if (this.month===1){this.month=12;this.year--}else{this.month--} this.loadData(); this.closePopup(); },
        nextMonth() { if (this.month===12){this.month=1;this.year++}else{this.month++} this.loadData(); this.closePopup(); }
    }
}

function fmt(d) { return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function pad(n) { return String(n).padStart(2,'0'); }
function barPosition(date, start, end) {
    if (date === start && date === end) return 'single';
    if (date === start) return 'start';
    if (date === end) return 'end';
    return 'mid';
}
</script>
{{end}}
