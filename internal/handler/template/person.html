{{define "content"}}
<div class="max-w-2xl mx-auto">
    <h1 class="text-lg font-semibold text-gray-800 dark:text-gray-100 mb-6">人员管理</h1>

    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-6 mb-6">
        <h2 class="text-sm font-semibold text-gray-700 dark:text-gray-300 mb-3">添加人员</h2>
        <form action="/person/create" method="POST" class="space-y-3">
            <div>
                <label class="block text-sm text-gray-600 dark:text-gray-400 mb-1">姓名</label>
                <input type="text" name="name" required class="border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200 rounded-lg px-3 py-1.5 text-sm w-full focus:ring-2 focus:ring-pink-500 focus:border-pink-500" placeholder="请输入姓名">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm text-gray-600 dark:text-gray-400 mb-1">月经周期（天）</label>
                    <input type="number" name="cycle_length" value="28" min="20" max="45" class="border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200 rounded-lg px-3 py-1.5 text-sm w-full focus:ring-2 focus:ring-pink-500">
                </div>
                <div>
                    <label class="block text-sm text-gray-600 dark:text-gray-400 mb-1">经期时长（天）</label>
                    <input type="number" name="period_length" value="5" min="2" max="10" class="border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200 rounded-lg px-3 py-1.5 text-sm w-full focus:ring-2 focus:ring-pink-500">
                </div>
            </div>
            <button type="submit" class="bg-pink-600 text-white px-4 py-1.5 rounded-lg text-sm hover:bg-pink-700 transition">添加</button>
        </form>
    </div>

    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-6">
        <h2 class="text-sm font-semibold text-gray-700 dark:text-gray-300 mb-3">已添加人员</h2>
        {{if .Persons}}
        <div class="space-y-3">
            {{range .Persons}}
            <div class="flex items-center justify-between p-4 bg-gray-50 dark:bg-gray-700 rounded-lg">
                <div>
                    <div class="font-medium text-gray-800 dark:text-gray-200">{{.Name}}</div>
                    <div class="text-xs text-gray-500 dark:text-gray-400">周期 {{.CycleLength}}天 · 经期 {{.PeriodLength}}天</div>
                </div>
                <div class="flex items-center gap-2">
                    <a href="/person/edit?id={{.ID}}" class="text-pink-600 dark:text-pink-400 hover:text-pink-800 dark:hover:text-pink-300 text-sm">编辑</a>
                    <form action="/person/delete" method="POST" class="inline" onsubmit="return confirm('确定删除 {{.Name}}？所有相关记录也将被删除。')">
                        <input type="hidden" name="id" value="{{.ID}}">
                        <button type="submit" class="text-red-500 hover:text-red-700 text-sm">删除</button>
                    </form>
                </div>
            </div>
            {{end}}
        </div>
        {{else}}
        <p class="text-sm text-gray-500 dark:text-gray-400">暂无人员，请先添加。</p>
        {{end}}
    </div>

    <div class="mt-4">
        <a href="/" class="text-sm text-pink-600 dark:text-pink-400 hover:text-pink-800 dark:hover:text-pink-300">返回日历</a>
    </div>
</div>
{{end}}
