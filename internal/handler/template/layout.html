{{define "layout"}}<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>月汐 - 月经记录</title>
    <meta name="description" content="月经记录与周期预测">
    <meta name="theme-color" content="#ec4899" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#1f2937" media="(prefers-color-scheme: dark)">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="月汐">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/favicon.ico" type="image/png">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <script>
        (function() {
            try {
                var s = JSON.parse(localStorage.getItem('yuexi_settings') || '{}');
                var theme = s.theme || 'system';
                var dark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
                if (dark) document.documentElement.classList.add('dark');
            } catch(e) {}
        })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(() => {});
        }
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen transition-colors" style="padding-top: env(safe-area-inset-top)">
    <nav class="bg-white dark:bg-gray-800 shadow-sm border-b border-gray-200 dark:border-gray-700">
        <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="/" class="text-xl font-bold text-pink-600 dark:text-pink-400">月汐</a>
            <div class="flex items-center gap-4">
                <a href="/" class="text-gray-600 dark:text-gray-300 hover:text-pink-600 dark:hover:text-pink-400 text-sm">日历</a>
                <a href="/person" class="text-gray-600 dark:text-gray-300 hover:text-pink-600 dark:hover:text-pink-400 text-sm nav-family-only">人员管理</a>
                <a href="/settings" class="text-gray-600 dark:text-gray-300 hover:text-pink-600 dark:hover:text-pink-400 text-sm">设置</a>
                <a href="/export" class="text-gray-600 dark:text-gray-300 hover:text-pink-600 dark:hover:text-pink-400 text-sm">导入/导出</a>
            </div>
        </div>
    </nav>
    <main class="max-w-5xl mx-auto px-4 py-6">
        {{template "content" .}}
    </main>
    <script>
        (function() {
            try {
                var s = JSON.parse(localStorage.getItem('yuexi_settings') || '{}');
                if (!s.familyMode) {
                    document.querySelectorAll('.nav-family-only').forEach(function(el) { el.style.display = 'none'; });
                }
            } catch(e) {}
        })();
    </script>
</body>
</html>{{end}}
