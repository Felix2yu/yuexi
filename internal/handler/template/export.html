{{define "content"}}
<div class="max-w-2xl mx-auto">
    <h1 class="text-lg font-semibold text-gray-800 dark:text-gray-100 mb-6">导入/导出</h1>

    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-6 mb-6">
        <h2 class="text-sm font-semibold text-gray-700 dark:text-gray-300 mb-3">导出数据</h2>
        <p class="text-sm text-gray-500 dark:text-gray-400 mb-4">将数据导出为 JSON 文件，可用于备份或迁移到其他实例。</p>
        <div class="flex gap-3">
            <a href="/export/download" class="bg-pink-600 text-white px-4 py-1.5 rounded-lg text-sm hover:bg-pink-700 transition">导出全部</a>
        </div>
    </div>

    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-6">
        <h2 class="text-sm font-semibold text-gray-700 dark:text-gray-300 mb-3">导入数据</h2>
        <p class="text-sm text-gray-500 dark:text-gray-400 mb-4">从之前导出的 JSON 文件导入数据。导入会创建新的人员和记录。</p>
        <form action="/import" method="POST" enctype="multipart/form-data" class="space-y-3">
            <div>
                <input type="file" name="file" accept=".json" required class="block w-full text-sm text-gray-500 dark:text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-medium file:bg-pink-50 dark:file:bg-pink-900/30 file:text-pink-700 dark:file:text-pink-400 hover:file:bg-pink-100 dark:hover:file:bg-pink-900/50">
            </div>
            <button type="submit" class="bg-pink-600 text-white px-4 py-1.5 rounded-lg text-sm hover:bg-pink-700 transition">导入</button>
        </form>
    </div>

    <div class="mt-4">
        <a href="/" class="text-sm text-pink-600 dark:text-pink-400 hover:text-pink-800 dark:hover:text-pink-300">返回日历</a>
    </div>
</div>
{{end}}
