{{define "content"}}
<div x-data="settings()" x-init="init()" class="max-w-2xl mx-auto">
    <h1 class="text-lg font-semibold text-gray-800 dark:text-gray-100 mb-6">设置</h1>

    <!-- Theme -->
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-6 mb-6">
        <h2 class="text-sm font-semibold text-gray-700 dark:text-gray-300 mb-4">外观</h2>
        <div class="flex gap-3">
            <template x-for="opt in themeOptions" :key="opt.value">
                <button type="button" @click="setTheme(opt.value)"
                    class="flex-1 py-3 px-4 rounded-lg border-2 text-sm font-medium transition-all text-center"
                    :class="theme === opt.value
                        ? 'border-pink-500 bg-pink-50 dark:bg-pink-900/30 text-pink-700 dark:text-pink-300'
                        : 'border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 text-gray-600 dark:text-gray-400 hover:border-gray-300 dark:hover:border-gray-500'">
                    <div x-text="opt.icon" class="text-lg mb-1"></div>
                    <div x-text="opt.label"></div>
                </button>
            </template>
        </div>
    </div>

    <!-- Family mode -->
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-6 mb-6">
        <h2 class="text-sm font-semibold text-gray-700 dark:text-gray-300 mb-4">模式</h2>
        <label class="flex items-center gap-3 cursor-pointer">
            <input type="checkbox" x-model="familyMode" @change="save()" class="w-4 h-4 rounded text-pink-600 focus:ring-pink-500">
            <div>
                <div class="text-sm font-medium text-gray-800 dark:text-gray-200">家庭模式</div>
                <div class="text-xs text-gray-500 dark:text-gray-400">开启后可记录多人的月经数据，导航栏显示「人员管理」</div>
            </div>
        </label>
    </div>

    <!-- Display settings -->
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-6 mb-6">
        <h2 class="text-sm font-semibold text-gray-700 dark:text-gray-300 mb-4">显示设置</h2>
        <label class="flex items-center gap-3 cursor-pointer">
            <input type="checkbox" x-model="showOvulation" @change="save()" class="w-4 h-4 rounded text-pink-600 focus:ring-pink-500">
            <div>
                <div class="text-sm font-medium text-gray-800 dark:text-gray-200">显示排卵日</div>
                <div class="text-xs text-gray-500 dark:text-gray-400">在日历上显示排卵日标记</div>
            </div>
        </label>
    </div>

    <!-- Person colors (family mode only) -->
    <div x-show="familyMode" class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-6 mb-6">
        <h2 class="text-sm font-semibold text-gray-700 dark:text-gray-300 mb-4">人员颜色</h2>
        <div class="space-y-4">
            {{range $i, $p := .Persons}}
            <div class="flex items-center gap-4">
                <span class="text-sm text-gray-700 dark:text-gray-300 w-20">{{$p.Name}}</span>
                <div class="flex gap-2">
                    <template x-for="(c, idx) in colorOptions" :key="idx">
                        <button type="button" class="w-7 h-7 rounded-full border-2 transition-all hover:scale-110"
                                :style="'background-color:' + c"
                                :class="personColors[{{$p.ID}}] === c ? 'border-gray-800 dark:border-white ring-2 ring-gray-300 dark:ring-gray-500' : 'border-gray-200 dark:border-gray-600'"
                                @click="setColor({{$p.ID}}, c)">
                        </button>
                    </template>
                </div>
            </div>
            {{end}}
        </div>
    </div>

    <a href="/" class="text-sm text-pink-600 dark:text-pink-400 hover:text-pink-800 dark:hover:text-pink-300">返回日历</a>
</div>

<script>
const COLOR_OPTIONS = ['#ef4444','#3b82f6','#10b981','#f59e0b','#8b5cf6','#ec4899','#14b8a6','#f97316','#6366f1','#84cc16','#06b6d4','#e11d48'];

function settings() {
    return {
        showOvulation: true,
        familyMode: false,
        theme: 'system',
        personColors: {},
        colorOptions: COLOR_OPTIONS,
        themeOptions: [
            { value: 'system', label: '跟随系统', icon: '🖥' },
            { value: 'light', label: '亮色', icon: '☀️' },
            { value: 'dark', label: '暗色', icon: '🌙' }
        ],

        init() {
            const s = loadSettings();
            this.showOvulation = s.showOvulation !== false;
            this.familyMode = s.familyMode === true;
            this.theme = s.theme || 'system';
            this.personColors = (s.personColors) ? {...s.personColors} : {};
        },

        setTheme(t) {
            this.theme = t;
            this.applyTheme();
            this.save();
        },

        applyTheme() {
            const dark = this.theme === 'dark' || (this.theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
            document.documentElement.classList.toggle('dark', dark);
        },

        setColor(pid, color) {
            this.personColors[pid] = color;
            this.save();
        },

        save() {
            saveSettings({
                showOvulation: this.showOvulation,
                familyMode: this.familyMode,
                theme: this.theme,
                personColors: this.personColors
            });
            // Toggle family-only nav items
            document.querySelectorAll('.nav-family-only').forEach(el => {
                el.style.display = this.familyMode ? '' : 'none';
            });
        }
    }
}
</script>
{{end}}
