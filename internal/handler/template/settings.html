{{define "content"}}
<div x-data="settings()" x-init="init()" class="max-w-2xl mx-auto">
    <h1 class="text-lg font-semibold text-gray-800 mb-6">设置</h1>

    <!-- Display settings -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6">
        <h2 class="text-sm font-semibold text-gray-700 mb-4">显示设置</h2>

        <label class="flex items-center gap-3 cursor-pointer">
            <input type="checkbox" x-model="showOvulation" @change="save()" class="w-4 h-4 rounded text-pink-600 focus:ring-pink-500">
            <div>
                <div class="text-sm font-medium text-gray-800">显示排卵日</div>
                <div class="text-xs text-gray-500">在日历上显示排卵日标记</div>
            </div>
        </label>
    </div>

    <!-- Person colors -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6">
        <h2 class="text-sm font-semibold text-gray-700 mb-4">人员颜色</h2>
        <div class="space-y-4">
            {{range $i, $p := .Persons}}
            <div class="flex items-center gap-4">
                <span class="text-sm text-gray-700 w-20">{{$p.Name}}</span>
                <div class="flex gap-2">
                    <template x-for="(c, idx) in colorOptions" :key="idx">
                        <button type="button" class="w-7 h-7 rounded-full border-2 transition-all hover:scale-110"
                                :style="'background-color:' + c"
                                :class="personColors[{{$p.ID}}] === c ? 'border-gray-800 ring-2 ring-gray-300' : 'border-gray-200'"
                                @click="setColor({{$p.ID}}, c)">
                        </button>
                    </template>
                </div>
            </div>
            {{end}}
        </div>
    </div>

    <a href="/" class="text-sm text-pink-600 hover:text-pink-800">返回日历</a>
</div>

<script>
const COLOR_OPTIONS = ['#ef4444','#3b82f6','#10b981','#f59e0b','#8b5cf6','#ec4899','#14b8a6','#f97316','#6366f1','#84cc16','#06b6d4','#e11d48'];

function settings() {
    return {
        showOvulation: true,
        personColors: {},
        colorOptions: COLOR_OPTIONS,

        init() {
            const s = loadSettings();
            this.showOvulation = s.showOvulation !== false;
            this.personColors = (s.personColors) ? {...s.personColors} : {};
        },

        setColor(pid, color) {
            this.personColors[pid] = color;
            this.save();
        },

        save() {
            saveSettings({
                showOvulation: this.showOvulation,
                personColors: this.personColors
            });
        }
    }
}
</script>
{{end}}
