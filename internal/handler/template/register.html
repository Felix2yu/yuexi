{{define "content"}}
<div class="max-w-sm mx-auto mt-12">
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-6">
        <h1 class="text-lg font-semibold text-gray-800 dark:text-gray-100 text-center mb-6">注册月汐账号</h1>

        {{if .Error}}
        <div class="bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 text-red-700 dark:text-red-400 text-sm px-4 py-2 rounded-lg mb-4" x-data="{show:true}" x-show="show" x-init="setTimeout(()=>show=false,3000)">
            {{.Error}}
        </div>
        {{end}}

        <form action="/register" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm text-gray-600 dark:text-gray-400 mb-1">用户名</label>
                <input type="text" name="username" required autofocus minlength="2" maxlength="20"
                    class="border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200 rounded-lg px-3 py-2 text-sm w-full focus:ring-2 focus:ring-pink-500 focus:border-pink-500"
                    placeholder="2-20个字符">
            </div>
            <div>
                <label class="block text-sm text-gray-600 dark:text-gray-400 mb-1">密码</label>
                <input type="password" name="password" required minlength="4"
                    class="border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200 rounded-lg px-3 py-2 text-sm w-full focus:ring-2 focus:ring-pink-500 focus:border-pink-500"
                    placeholder="至少4个字符">
            </div>
            <div>
                <label class="block text-sm text-gray-600 dark:text-gray-400 mb-1">确认密码</label>
                <input type="password" name="confirm" required
                    class="border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200 rounded-lg px-3 py-2 text-sm w-full focus:ring-2 focus:ring-pink-500 focus:border-pink-500">
            </div>
            <button type="submit" class="w-full bg-pink-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-pink-700 transition">注册</button>
        </form>

        <div class="mt-4 text-center">
            <a href="/login" class="text-sm text-pink-600 dark:text-pink-400 hover:text-pink-800 dark:hover:text-pink-300">已有账号？登录</a>
        </div>
    </div>
</div>
{{end}}
