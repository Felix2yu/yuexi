{{define "content"}}
<div class="max-w-lg mx-auto">
    <h1 class="text-lg font-semibold text-gray-800 dark:text-gray-100 mb-6">编辑人员</h1>

    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-6">
        <form action="/person/edit?id={{.Person.ID}}" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm text-gray-600 dark:text-gray-400 mb-1">姓名</label>
                <input type="text" name="name" value="{{.Person.Name}}" required class="border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200 rounded-lg px-3 py-1.5 text-sm w-full focus:ring-2 focus:ring-pink-500 focus:border-pink-500">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm text-gray-600 dark:text-gray-400 mb-1">月经周期（天）</label>
                    <input type="number" name="cycle_length" value="{{.Person.CycleLength}}" min="20" max="45" class="border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200 rounded-lg px-3 py-1.5 text-sm w-full focus:ring-2 focus:ring-pink-500">
                </div>
                <div>
                    <label class="block text-sm text-gray-600 dark:text-gray-400 mb-1">经期时长（天）</label>
                    <input type="number" name="period_length" value="{{.Person.PeriodLength}}" min="2" max="10" class="border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200 rounded-lg px-3 py-1.5 text-sm w-full focus:ring-2 focus:ring-pink-500">
                </div>
            </div>
            <div class="flex gap-3">
                <button type="submit" class="bg-pink-600 text-white px-4 py-1.5 rounded-lg text-sm hover:bg-pink-700 transition">保存</button>
                <a href="/person" class="border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 px-4 py-1.5 rounded-lg text-sm hover:bg-gray-50 dark:hover:bg-gray-700 transition">取消</a>
            </div>
        </form>
    </div>
</div>
{{end}}
